<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Shop Finder</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 0;
    }

    header {
        background: #2c7be5;
        color: white;
        text-align: center;
        padding: 15px;
    }

    .container {
        width: 90%;
        max-width: 900px;
        margin: auto;
        padding: 20px;
    }

    .search-box {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    input, select, button {
        padding: 10px;
        font-size: 16px;
    }

    button {
        background: #28a745;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background: #218838;
    }

    .shop-card {
        background: white;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .shop-card h3 {
        margin: 0;
        color: #333;
    }

    .shop-card p {
        margin: 5px 0;
    }
</style>
</head>
<body>

<header>
    <h1>Local Shop Finder</h1>
    <p>Find nearby shops for daily needs</p>
</header>

<div class="container">

    <div class="search-box">
        <select id="category">
            <option value="">Select Need</option>
            <option value="Grocery">Grocery</option>
            <option value="Medical">Medical</option>
            <option value="Vegetables">Vegetables</option>
            <option value="Milk">Milk</option>
            <option value="Bakery">Bakery</option>
        </select>

        <button onclick="findShops()">Search Shops</button>
    </div>

    <div id="results"></div>

</div>

<script>
const shops = [
    {name:"Fresh Grocery Store", type:"Grocery", area:"Main Market", phone:"9876543210"},
    {name:"Health Medical Shop", type:"Medical", area:"Bus Stand", phone:"9876501234"},
    {name:"Green Veggie Shop", type:"Vegetables", area:"Village Chowk", phone:"9988776655"},
    {name:"Daily Milk Center", type:"Milk", area:"Station Road", phone:"9123456789"},
    {name:"Sweet Bakery", type:"Bakery", area:"Town Center", phone:"9090909090"}
];

function findShops() {
    const category = document.getElementById("category").value;
    const results = document.getElementById("results");

    results.innerHTML = "";

    const filtered = shops.filter(shop => shop.type === category);

    if(filtered.length === 0){
        results.innerHTML = "<p>No shops found.</p>";
        return;
    }

    filtered.forEach(shop => {
        results.innerHTML += `
            <div class="shop-card">
                <h3>${shop.name}</h3>
                <p><strong>Category:</strong> ${shop.type}</p>
                <p><strong>Location:</strong> ${shop.area}</p>
                <p><strong>Phone:</strong> ${shop.phone}</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
